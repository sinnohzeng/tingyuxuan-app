name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  TINGYUXUAN_MOCK_AUDIO: "1"

jobs:
  # ── Stage 1: Build jobs (fan-out) ─────────────────────────────

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Set NDK environment
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-android-

      - name: Build native libraries
        run: |
          bash crates/tingyuxuan-jni/build-android.sh

      - name: Copy .so to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp target/aarch64-linux-android/release/libtingyuxuan_jni.so \
             android/app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libtingyuxuan_jni.so \
             android/app/src/main/jniLibs/armeabi-v7a/
          cp target/x86_64-linux-android/release/libtingyuxuan_jni.so \
             android/app/src/main/jniLibs/x86_64/

      - name: Build APK (debug signing)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: android/app/build/outputs/apk/release/*.apk

  # ── Stage 2: Create Release (fan-in) ──────────────────────────

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          VERSION="${{ steps.version.outputs.version }}"

          # Linux
          for f in artifacts/linux-artifacts/deb/*.deb; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done
          for f in artifacts/linux-artifacts/appimage/*.AppImage; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # Windows
          for f in artifacts/windows-artifacts/msi/*.msi; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done
          for f in artifacts/windows-artifacts/nsis/*.exe; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # Android
          for f in artifacts/android-artifacts/*.apk; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # Generate SHA256SUMS
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TingYuXuan v${{ steps.version.outputs.version }}"
          files: release-files/*
          draft: true
          generate_release_notes: true

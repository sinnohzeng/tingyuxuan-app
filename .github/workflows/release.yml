name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  TINGYUXUAN_MOCK_AUDIO: "1"

jobs:
  # ── Stage 1: Build jobs (fan-out) ─────────────────────────────

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      # ── Code Signing (Linux) ──────────────────────────────────
      # Linux packages (.deb, .AppImage) typically don't require code signing,
      # but GPG signing can be added here for package repository distribution.
      # Steps:
      #   1. Store GPG private key as GitHub Secret: GPG_PRIVATE_KEY
      #   2. Import key: echo "$GPG_PRIVATE_KEY" | gpg --batch --import
      #   3. Sign: dpkg-sig --sign builder *.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      # ── Code Signing (Windows) ────────────────────────────────
      # Windows executables and MSI installers should be signed with an
      # Authenticode certificate to avoid SmartScreen warnings.
      # Steps:
      #   1. Store certificate as GitHub Secret: WINDOWS_CERTIFICATE (base64-encoded .pfx)
      #   2. Store password as: WINDOWS_CERTIFICATE_PASSWORD
      #   3. Decode: echo "$WINDOWS_CERTIFICATE" | base64 -d > cert.pfx
      #   4. Sign: signtool sign /f cert.pfx /p "$WINDOWS_CERTIFICATE_PASSWORD" /tr http://timestamp.digicert.com /td sha256 /fd sha256 *.exe *.msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Set NDK environment
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-android-

      - name: Build native libraries
        run: |
          bash crates/tingyuxuan-jni/build-android.sh

      - name: Copy .so to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp target/aarch64-linux-android/release/libtingyuxuan_jni.so \
             android/app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libtingyuxuan_jni.so \
             android/app/src/main/jniLibs/armeabi-v7a/
          cp target/x86_64-linux-android/release/libtingyuxuan_jni.so \
             android/app/src/main/jniLibs/x86_64/

      - name: Verify .so files
        run: |
          echo "=== Verifying native libraries ==="
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SO="android/app/src/main/jniLibs/$abi/libtingyuxuan_jni.so"
            if [ ! -f "$SO" ]; then
              echo "ERROR: Missing $SO"
              exit 1
            fi
            SIZE=$(stat -c%s "$SO")
            echo "$abi: $(( SIZE / 1024 ))KB"
            if [ "$SIZE" -lt 102400 ]; then
              echo "ERROR: $SO is suspiciously small (${SIZE} bytes < 100KB)"
              exit 1
            fi
          done
          echo "All .so files verified"

      - name: Build APK (debug signing)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Verify APK contains .so
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK"
          echo "APK size: $(( $(stat -c%s "$APK") / 1024 ))KB"
          # Check .so is packaged inside APK
          for abi in arm64-v8a armeabi-v7a x86_64; do
            if ! unzip -l "$APK" | grep -q "lib/$abi/libtingyuxuan_jni.so"; then
              echo "ERROR: APK missing lib/$abi/libtingyuxuan_jni.so"
              exit 1
            fi
            echo "OK: lib/$abi/libtingyuxuan_jni.so found in APK"
          done

      # ── Code Signing (Android) ────────────────────────────────
      # Production APKs must be signed with a release keystore.
      # Steps:
      #   1. Generate keystore: keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000
      #   2. Store as GitHub Secrets:
      #      - ANDROID_KEYSTORE (base64-encoded .jks)
      #      - ANDROID_KEYSTORE_PASSWORD
      #      - ANDROID_KEY_ALIAS
      #      - ANDROID_KEY_PASSWORD
      #   3. Decode: echo "$ANDROID_KEYSTORE" | base64 -d > android/release.jks
      #   4. Configure signing in android/app/build.gradle.kts signingConfigs block
      #   5. Use: ./gradlew assembleRelease (with signing config applied)

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: android/app/build/outputs/apk/release/*.apk

  build-macos:
    name: Build macOS Packages
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      # ── Code Signing (macOS) ─────────────────────────────────
      # macOS apps should be signed with a Developer ID Application certificate
      # and notarized via Apple's notary service to avoid Gatekeeper warnings.
      # Steps:
      #   1. Store certificate as GitHub Secret: MACOS_CERTIFICATE (base64-encoded .p12)
      #   2. Store password as: MACOS_CERTIFICATE_PASSWORD
      #   3. Create temporary keychain:
      #      echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
      #      security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      #      security default-keychain -s build.keychain
      #      security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      #      security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #      security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      #   4. Notarize:
      #      xcrun notarytool submit <DMG> --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
      #      xcrun stapler staple <DMG>

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app

  # ── Stage 2: Create Release (fan-in) ──────────────────────────

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-android, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          VERSION="${{ steps.version.outputs.version }}"

          # Linux
          for f in artifacts/linux-artifacts/deb/*.deb; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done
          for f in artifacts/linux-artifacts/appimage/*.AppImage; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # Windows
          for f in artifacts/windows-artifacts/msi/*.msi; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done
          for f in artifacts/windows-artifacts/nsis/*.exe; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # macOS
          for f in artifacts/macos-artifacts/dmg/*.dmg; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # Android
          for f in artifacts/android-artifacts/*.apk; do
            [ -f "$f" ] && cp "$f" "release-files/TingYuXuan-v${VERSION}-$(basename "$f")"
          done

          # Generate SHA256SUMS
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ── Sentry Release ──────────────────────────────────────
      - name: Setup Sentry CLI
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-cli-setup@v2
        with:
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Create Sentry Release
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sentry-cli releases new -o "$SENTRY_ORG" -p "$SENTRY_PROJECT" "$VERSION"
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TingYuXuan v${{ steps.version.outputs.version }}"
          files: release-files/*
          draft: true
          generate_release_notes: true
